<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مساعد السفر الذكي</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  :root {
    --emerald: #0d6e4e;
    --emerald-light: #10a070;
    --emerald-glow: #1de99b;
    --gold: #c9a84c;
    --gold-light: #f0cc6e;
    --dark: #07120e;
    --dark-2: #0e1f18;
    --dark-3: #152c22;
    --dark-4: #1c3a2d;
    --text: #e8f5ef;
    --text-muted: #7aad94;
    --border: rgba(29, 233, 155, 0.15);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Cairo', sans-serif;
    background: var(--dark);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      radial-gradient(circle at 20% 20%, rgba(13,110,78,0.15) 0%, transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(201,168,76,0.08) 0%, transparent 50%);
    pointer-events: none; z-index: 0;
  }
  .app {
    position: relative; z-index: 1;
    display: flex; flex-direction: column;
    height: 100vh; max-width: 800px;
    margin: 0 auto; width: 100%;
  }

  /* HEADER */
  .header {
    padding: 14px 18px;
    background: linear-gradient(135deg, var(--dark-3), var(--dark-2));
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px;
  }
  .logo {
    width: 42px; height: 42px;
    background: linear-gradient(135deg, var(--emerald), var(--emerald-light));
    border-radius: 13px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; box-shadow: 0 4px 20px rgba(13,110,78,0.4); flex-shrink: 0;
  }
  .header-info { flex: 1; }
  .header-info h1 { font-size: 16px; font-weight: 700; line-height: 1.2; }
  .header-info p { font-size: 11px; color: var(--text-muted); font-family: 'Tajawal', sans-serif; }
  .status-dot {
    width: 7px; height: 7px; background: var(--emerald-glow);
    border-radius: 50%; display: inline-block; margin-left: 4px;
    animation: pulse 2s infinite; vertical-align: middle;
  }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.5;transform:scale(0.8);} }

  /* Settings icon in header */
  .settings-btn {
    width: 36px; height: 36px;
    background: var(--dark-4); border: 1px solid var(--border);
    border-radius: 10px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; transition: all 0.2s; flex-shrink: 0;
  }
  .settings-btn:hover { background: var(--dark-3); border-color: rgba(29,233,155,0.3); }

  /* Settings Modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.7); z-index: 100;
    align-items: center; justify-content: center; padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--dark-3); border: 1px solid var(--border);
    border-radius: 20px; padding: 24px; width: 100%; max-width: 400px;
    animation: fadeIn 0.2s ease;
  }
  .modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 16px; color: var(--gold-light); }
  .modal label { font-size: 12px; color: var(--text-muted); display: block; margin-bottom: 6px; font-family: 'Tajawal', sans-serif; }
  .modal input {
    width: 100%; background: var(--dark-2); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 14px; color: var(--text);
    font-family: 'Tajawal', sans-serif; font-size: 13px; outline: none;
    direction: ltr; margin-bottom: 14px;
  }
  .modal input:focus { border-color: rgba(29,233,155,0.5); }
  .modal-btns { display: flex; gap: 10px; }
  .btn-save {
    flex: 1; padding: 10px; background: linear-gradient(135deg, var(--emerald), var(--emerald-light));
    border: none; border-radius: 10px; color: #fff;
    font-family: 'Cairo', sans-serif; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: all 0.2s;
  }
  .btn-save:hover { transform: scale(1.02); }
  .btn-cancel {
    padding: 10px 16px; background: var(--dark-4); border: 1px solid var(--border);
    border-radius: 10px; color: var(--text-muted);
    font-family: 'Cairo', sans-serif; font-size: 14px;
    cursor: pointer;
  }

  /* PDF Banner */
  .pdf-banner {
    margin: 10px 14px;
    padding: 10px 14px;
    background: linear-gradient(135deg, rgba(201,168,76,0.08), rgba(201,168,76,0.03));
    border: 1px dashed rgba(201,168,76,0.35);
    border-radius: 12px;
    display: flex; align-items: center; gap: 10px;
    cursor: pointer; transition: all 0.3s;
  }
  .pdf-banner:hover { border-color: rgba(201,168,76,0.6); }
  .pdf-banner.loaded { border-style: solid; border-color: rgba(29,233,155,0.4); background: linear-gradient(135deg, rgba(13,110,78,0.15), rgba(13,110,78,0.05)); }
  .pdf-icon { font-size: 20px; flex-shrink: 0; }
  .pdf-text { flex: 1; }
  .pdf-text strong { font-size: 12px; color: var(--gold-light); display: block; }
  .pdf-text span { font-size: 11px; color: var(--text-muted); font-family: 'Tajawal', sans-serif; }
  .pdf-banner.loaded .pdf-text strong { color: var(--emerald-glow); }
  #pdfInput { display: none; }

  /* Chat */
  .chat-area {
    flex: 1; overflow-y: auto; padding: 14px;
    display: flex; flex-direction: column; gap: 14px;
    scrollbar-width: thin; scrollbar-color: var(--dark-4) transparent;
  }
  .chat-area::-webkit-scrollbar { width: 3px; }
  .chat-area::-webkit-scrollbar-thumb { background: var(--dark-4); border-radius: 4px; }

  .welcome { text-align: center; padding: 20px 16px; animation: fadeIn 0.8s ease; }
  .welcome-icon { font-size: 42px; margin-bottom: 8px; display: block; }
  .welcome h2 { font-size: 18px; font-weight: 700; color: var(--gold-light); margin-bottom: 6px; }
  .welcome p { font-size: 13px; color: var(--text-muted); line-height: 1.7; font-family: 'Tajawal', sans-serif; max-width: 380px; margin: 0 auto 14px; }
  .quick-btns { display: flex; flex-wrap: wrap; gap: 7px; justify-content: center; }
  .quick-btn {
    padding: 7px 13px; background: var(--dark-3); border: 1px solid var(--border);
    border-radius: 20px; color: var(--text); font-size: 12px;
    cursor: pointer; font-family: 'Cairo', sans-serif; transition: all 0.2s;
  }
  .quick-btn:hover { background: var(--dark-4); border-color: rgba(29,233,155,0.4); color: var(--emerald-glow); }

  .msg { display: flex; gap: 8px; animation: slideUp 0.3s ease; }
  .msg.user { flex-direction: row-reverse; }
  @keyframes slideUp { from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);} }
  @keyframes fadeIn { from{opacity:0;}to{opacity:1;} }
  .msg-avatar {
    width: 30px; height: 30px; border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; flex-shrink: 0; margin-top: 4px;
  }
  .msg.ai .msg-avatar { background: var(--dark-3); border: 1px solid var(--border); }
  .msg.user .msg-avatar { background: var(--emerald); }
  .msg-content {
    max-width: 80%; padding: 10px 14px; border-radius: 15px;
    font-size: 14px; line-height: 1.75; font-family: 'Tajawal', sans-serif;
  }
  .msg.ai .msg-content { background: var(--dark-3); border: 1px solid var(--border); border-top-right-radius: 4px; }
  .msg.user .msg-content { background: var(--emerald); border-top-left-radius: 4px; color:#fff; }

  .typing { display:flex; gap:5px; align-items:center; padding:3px 0; }
  .typing span { width:6px; height:6px; background:var(--emerald-glow); border-radius:50%; animation:bounce 1.2s infinite; }
  .typing span:nth-child(2){animation-delay:0.2s;}
  .typing span:nth-child(3){animation-delay:0.4s;}
  @keyframes bounce{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-7px);}}

  /* Input */
  .input-area {
    padding: 10px 14px 12px;
    background: var(--dark-2); border-top: 1px solid var(--border);
    display: flex; gap: 9px; align-items: flex-end;
  }
  .input-wrapper {
    flex: 1; background: var(--dark-3); border: 1px solid var(--border);
    border-radius: 15px; padding: 9px 14px;
    display: flex; align-items: center; transition: border-color 0.2s;
  }
  .input-wrapper:focus-within { border-color: rgba(29,233,155,0.5); }
  textarea {
    flex:1; background:none; border:none; outline:none;
    color:var(--text); font-family:'Tajawal',sans-serif;
    font-size:14px; resize:none; max-height:90px; line-height:1.5; direction:rtl;
  }
  textarea::placeholder { color: var(--text-muted); }
  .send-btn {
    width:42px; height:42px;
    background:linear-gradient(135deg,var(--emerald),var(--emerald-light));
    border:none; border-radius:13px; cursor:pointer;
    display:flex; align-items:center; justify-content:center; font-size:17px;
    transition:all 0.2s; box-shadow:0 4px 15px rgba(13,110,78,0.4); flex-shrink:0;
  }
  .send-btn:hover{transform:scale(1.05);}
  .send-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
  .disclaimer{text-align:center;font-size:10px;color:var(--text-muted);padding:3px 0;font-family:'Tajawal',sans-serif;}
</style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <div class="header">
    <div class="logo">🕌</div>
    <div class="header-info">
      <h1>مساعد السفر الحلال <span class="status-dot"></span></h1>
      <p>مطاعم • مساجد • فنادق • رحلات مميزة</p>
    </div>
    <div class="settings-btn" onclick="openSettings()" title="الإعدادات">⚙️</div>
  </div>

  <!-- PDF Upload -->
  <div class="pdf-banner" id="pdfBanner" onclick="document.getElementById('pdfInput').click()">
    <div class="pdf-icon" id="pdfIcon">📄</div>
    <div class="pdf-text">
      <strong id="pdfLabel">ارفع دليل سفرك (PDF أو TXT)</strong>
      <span id="pdfSub">المساعد سيقرأه ويجاوب الزبائن بناءً عليه</span>
    </div>
    <span id="pdfArrow" style="color:var(--gold);font-size:16px;">↑</span>
    <input type="file" id="pdfInput" accept=".pdf,.txt" onchange="handlePDF(event)">
  </div>

  <!-- Chat -->
  <div class="chat-area" id="chatArea">
    <div class="welcome" id="welcomeMsg">
      <span class="welcome-icon">✈️</span>
      <h2>أهلاً بك في مساعد السفر الذكي!</h2>
      <p>ارفع دليل سفرك وابدأ تجاوب زبائنك فوراً 🌍</p>
      <div class="quick-btns">
        <button class="quick-btn" onclick="sendQuick('فين أقرب مطعم حلال؟')">🍽️ مطاعم حلال</button>
        <button class="quick-btn" onclick="sendQuick('فين أقرب مسجد للصلاة؟')">🕌 أقرب مسجد</button>
        <button class="quick-btn" onclick="sendQuick('ما هي أفضل الفنادق؟')">🏨 فنادق مميزة</button>
        <button class="quick-btn" onclick="sendQuick('كيف أنسّق رحلتي؟')">🗺️ تنسيق الرحلة</button>
        <button class="quick-btn" onclick="sendQuick('ما هي أهم المناطق السياحية؟')">📸 السياحة</button>
      </div>
    </div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
    <div class="input-wrapper">
      <textarea id="msgInput" placeholder="اسأل عن أي شيء... 🌍" rows="1"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    </div>
  </div>
  <div class="disclaimer">مدعوم بـ Gemini AI (مجاني) • 24/7</div>
</div>

<!-- Settings Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeOnBg(event)">
  <div class="modal">
    <h3>⚙️ الإعدادات</h3>
    <label>🔑 Gemini API Key</label>
    <input type="password" id="keyInput" placeholder="AIza..." />
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeSettings()">إلغاء</button>
      <button class="btn-save" onclick="saveKey()">💾 حفظ</button>
    </div>
  </div>
</div>

<script>
  let pdfContent = '';
  let chatHistory = [];
  let isLoading = false;
  let GEMINI_KEY = localStorage.getItem('gemini_key') || '';

  window.onload = () => {
    if (GEMINI_KEY) document.getElementById('keyInput').value = GEMINI_KEY;
    // Auto open settings if no key
    if (!GEMINI_KEY) setTimeout(openSettings, 800);
  };

  function openSettings() {
    document.getElementById('keyInput').value = GEMINI_KEY || '';
    document.getElementById('modalOverlay').classList.add('open');
  }
  function closeSettings() { document.getElementById('modalOverlay').classList.remove('open'); }
  function closeOnBg(e) { if (e.target === document.getElementById('modalOverlay')) closeSettings(); }

  function saveKey() {
    const val = document.getElementById('keyInput').value.trim();
    if (!val) { alert('الرجاء إدخال الـ Key'); return; }
    GEMINI_KEY = val;
    localStorage.setItem('gemini_key', val);
    closeSettings();
    addSystemMsg('✅ تم حفظ الـ Key! المساعد جاهز 🎉');
  }

  async function handlePDF(event) {
    const file = event.target.files[0];
    if (!file) return;
    const label = document.getElementById('pdfLabel');
    const sub   = document.getElementById('pdfSub');
    const icon  = document.getElementById('pdfIcon');
    const arrow = document.getElementById('pdfArrow');
    const banner = document.getElementById('pdfBanner');
    label.textContent = '⏳ جاري القراءة...'; icon.textContent = '⏳';
    try {
      if (file.type === 'text/plain') {
        const reader = new FileReader();
        reader.onload = (e) => {
          pdfContent = e.target.result.slice(0, 12000);
          setLoaded(banner,label,sub,icon,arrow,file.name,'');
          addSystemMsg('✅ تم تحميل الدليل! جاهز 🎉');
        };
        reader.readAsText(file);
      } else if (file.type === 'application/pdf') {
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        const pdf = await pdfjsLib.getDocument({ data: await file.arrayBuffer() }).promise;
        let text = '';
        for (let i = 1; i <= Math.min(pdf.numPages, 20); i++) {
          const page = await pdf.getPage(i);
          const c = await page.getTextContent();
          text += c.items.map(x => x.str).join(' ') + '\n';
        }
        if (!text.trim()) throw new Error('الملف لا يحتوي نصاً قابلاً للقراءة');
        pdfContent = text.slice(0, 12000);
        setLoaded(banner,label,sub,icon,arrow,file.name,`${pdf.numPages} صفحة`);
        addSystemMsg(`✅ تم قراءة ${pdf.numPages} صفحة. جاهز! 🎉`);
      }
    } catch(err) {
      label.textContent = '❌ ' + (err.message || 'خطأ'); icon.textContent = '❌';
    }
  }

  function setLoaded(banner,label,sub,icon,arrow,name,extra) {
    banner.classList.add('loaded');
    label.textContent = '✅ ' + name;
    sub.textContent = extra ? extra + ' • جاهز!' : 'جاهز!';
    icon.textContent = '📗'; arrow.textContent = '✓';
    arrow.style.color = 'var(--emerald-glow)';
  }

  function addSystemMsg(text) {
    const w = document.getElementById('welcomeMsg');
    if (w) w.remove();
    const div = document.createElement('div');
    div.style.cssText = 'text-align:center;padding:7px 14px;background:rgba(29,233,155,0.08);border:1px solid rgba(29,233,155,0.2);border-radius:10px;font-size:12px;color:var(--emerald-glow);font-family:Tajawal,sans-serif;';
    div.textContent = text;
    const ca = document.getElementById('chatArea');
    ca.appendChild(div); ca.scrollTop = ca.scrollHeight;
  }

  function addMessage(role, text) {
    const w = document.getElementById('welcomeMsg');
    if (w) w.remove();
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    div.innerHTML = `<div class="msg-avatar">${role==='ai'?'🕌':'👤'}</div><div class="msg-content">${text.replace(/\n/g,'<br>')}</div>`;
    const ca = document.getElementById('chatArea');
    ca.appendChild(div); ca.scrollTop = ca.scrollHeight;
  }

  function showTyping() {
    const div = document.createElement('div');
    div.className = 'msg ai'; div.id = 'typing';
    div.innerHTML = `<div class="msg-avatar">🕌</div><div class="msg-content"><div class="typing"><span></span><span></span><span></span></div></div>`;
    const ca = document.getElementById('chatArea');
    ca.appendChild(div); ca.scrollTop = ca.scrollHeight;
  }
  function removeTyping() { const t=document.getElementById('typing'); if(t) t.remove(); }

  async function sendMessage() {
    const input = document.getElementById('msgInput');
    const text = input.value.trim();
    if (!text || isLoading) return;
    if (!GEMINI_KEY) { openSettings(); return; }

    input.value = ''; input.style.height = 'auto';
    isLoading = true; document.getElementById('sendBtn').disabled = true;
    addMessage('user', text);
    chatHistory.push({ role: 'user', parts: [{ text }] });
    showTyping();

    const sys = `أنت مساعد سفر ذكي متخصص في السياحة الحلال. ساعد الزبائن في إيجاد مطاعم حلال، مساجد، فنادق، وتنسيق رحلات.
${pdfContent ? `\n=== دليل السفر ===\n${pdfContent}\n===\nاستند على هذه المعلومات دائماً.` : ''}
تحدث بالعربية بشكل ودي ومهني. إجاباتك واضحة ومنظمة.`;

    try {
      const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_KEY}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          system_instruction: { parts: [{ text: sys }] },
          contents: chatHistory
        })
      });
      const data = await res.json();
      removeTyping();
      if (data.error) {
        addMessage('ai', `❌ ${data.error.message}`);
      } else {
        const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || 'عذراً، حاول مرة ثانية.';
        chatHistory.push({ role: 'model', parts: [{ text: reply }] });
        addMessage('ai', reply);
      }
    } catch(e) {
      removeTyping();
      addMessage('ai', '❌ مشكلة في الاتصال. حاول مرة ثانية.');
    }
    isLoading = false; document.getElementById('sendBtn').disabled = false; input.focus();
  }

  function sendQuick(t) { document.getElementById('msgInput').value = t; sendMessage(); }
  function handleKey(e) { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();} }
  function autoResize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,90)+'px'; }
</script>
</body>
</html>
